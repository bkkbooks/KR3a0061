body:
  text: 政經儒家類提要臣等謹案政經一卷宋真徳秀撰采典籍中論政之言列于前而以行政之迹列于後題曰𫝊以别之末附當時近事六條謂之附録其後載徳秀帥長沙咨呈及知泉州軍事時勸諭文帥長沙時勸民間置義倉文帥福州曉諭文諸篇葢後人所益如心經之引讀書記耳徳秀雖自命大儒斷不敢以己之條教題曰經也按宋史道學𫝊徳秀任湖南安撫使知潭州以㢘仁公勤四字厲僚屬復立惠民倉置社倉其知福州戒所部無濫刑横斂無徇私黷貨葢徳秀立朝日淺其政績多在居外任時故留心民瘼著為此編其門人王邁序謂先生再守温陵日著政經考徳秀再守泉州在理宗紹定五年葢晚年之作邁又言趙時棣為法曹朝夕相與遂得此經實在四方門人之先而四方門人亦未必盡見之書録解題載心經而不及此書豈心經行世早而此書晚出歟抑或徳秀名重好事者依託之也真偽既不可詰而其言能不悖于儒者故姑與心經並存焉乾隆四十五年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b23d99faa0663f2f2e0671bb1801966bace7303eaeb941c9832c35eac225d40d
