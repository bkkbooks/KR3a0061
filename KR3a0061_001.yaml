body:
  text: 政經宋真德秀撰康誥王曰嗚呼小子封恫瘝乃身恫痛瘝病也敬哉天畏棐忱民情大可見小人難保徃盡乃心無康好逸豫乃其乂民我聞曰怨不在大亦不在小惠不惠懋不懋一事不順一行不勉則足致怨故順其所不順勉其所不勉則自然無怨又曰若保赤子惟民其康乂又曰要囚服念五六日囚之要辭服膺思念至于旬時旬十日時三月丕蔽要囚丕大蔽斷周官王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反以公滅私民其允懐學古入官議事以制因事制宜政乃不迷其爾典常作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面涖事惟煩戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱位不期驕禄不期侈恭儉惟德無載爾偽作德心逸日休作偽心勞日拙居寵思危罔不惟畏弗畏入畏推賢讓能庶官乃和不和政龎龎雜亂也舉能其官惟爾之能稱非其人惟爾不任君陳王若曰君陳惟爾令德孝恭惟孝友于兄弟克施有政命汝尹兹東郊敬哉又曰爾惟風下民惟草圖厥政莫或不艱有廢有興出入自爾師虞師衆虞度庶言同則繹繹紬繹也謀多斷獨又曰無依勢作威無倚法以削寛而有制從容以和又曰爾無忿疾于頑無求備于一夫必有忍其乃有濟有容德乃大簡厥修亦簡其或不修進厥良以率其或不良惟民生厚因物有遷違上所命從厥攸好爾克敬典在德時乃罔不變允升于大猷君牙爾身克正罔敢弗正民心罔中惟爾之中夏暑雨小民惟曰怨咨怨嘆咨嗟冬祁寒小民亦惟曰怨咨祁大寒也厥惟艱哉思其艱以圖其易民乃寧吕刑王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及度詳審也及謂獄辭所逮兩造具備兩爭俱至師聽五辭師衆獄官五辭五刑之辭五辭簡孚簡核孚信正于五刑無疑然後用刑五刑不簡正于五罰五罰不服正于五過宥之五過之疵病也惟官勢位惟反報怨報德惟内女謁惟貨賄賂惟來干請其罪惟鈞以此五者故有當刑而罰當罰而宥者犯者以其罪罪之其審克之審謂詳度克謂勝私五刑之疑有赦五罰之疑有赦其審克之簡孚有衆惟貌有稽周禮色聽無簡不聽具嚴天威嚴敬天威又曰罰懲非死人極于病財與命均非佞折獄佞謂捷給惟良折獄良謂長厚罔非在中察辭于差辭聼非從惟從非從我意惟從于理哀敬折獄明啓刑書胥占與衆同占度咸庶中正其刑其罰其審克之又曰獄貨非寳鬻獄得貨惟府辜功府聚辜罪功事報以庶尤衆罪周公曰不簡不易民不有近平易近民民必歸之此周公之言而載于史記故附書之後易山下有火賁君子以明庶政無敢折獄山下有火明不及逺故明審庶政不敢輕於斷獄山上有火旅君子以明慎用刑而不留獄火之在髙明無不照恃明則輕故言謹謹之過則留獄故言不留雷電皆至豐君子以折獄致刑離明照察之象故以折獄震動威斷之象故以致刑澤上有風中孚君子以議獄緩死風感水受中孚之象議獄緩死中孚之意子曰道千乘之國敬事而信節用而愛人使民以時子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格哀公問曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服季康子問使民敬忠以勸如之何子曰臨之以莊則敬孝慈則忠舉善而教不能則勸子曰雍也可使南面仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎子曰雍之言然子貢問政子曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立子曰片言可以折獄者其由也與子路無宿諾子曰聽訟吾猶人也必也使無訟乎子張問政子曰居之無倦行之以忠季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正季康子患盗問於孔子孔子對曰茍子之不欲雖賞之不竊季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃子路問政子曰先之勞之勞如字請益曰無倦仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸樊遲請學稼子曰吾不如老農請學為圃曰吾不如老圃樊遲出子曰小人哉樊須也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁負其子而至矣焉用稼子曰其身正不令而行其身不正雖令不從子適衞冉有僕子曰庶矣哉冉有曰既庶矣又何加焉曰富之曰既富矣又何加焉曰教之子曰茍正其身矣於從政乎何有不能正其身如正人何葉公問政子曰近者説逺者來子夏為莒父宰問政子曰無欲速無見小利欲速則不逹見小利則大事不成子曰上好禮則民易使也子曰知及之仁不能守之雖得之必失之知及之仁能守之不莊以涖之則民不敬知及之仁能守之莊以涖之動之不以禮未善也子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉用牛刀子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也子曰二三子偃之言是也前言戱之耳子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰恭寛信敏惠恭則不侮寛則得衆信則人任焉敏則有功惠則足以使人孟氏使陽膚為士師問於曽子曽子曰上失其道民散久矣如得其情則哀矜而勿喜子張問於孔子曰何如斯可以從政矣子曰尊五美屏四惡斯可以從政矣子張曰何謂五美子曰君子惠而不費勞而不怨欲而不貪泰而不驕威而不猛子張曰何謂惠而不費子曰因民之所利而利之斯不亦惠而不費乎擇可勞而勞之又誰怨欲仁而得仁又焉貪君子無衆寡無小大無敢慢斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎子張曰何謂四惡子曰不教而殺謂之虐不戒視成謂之暴慢令致期謂之賊猶之與人也出納之吝謂之有司寛則得衆信則民任焉敏則有功公則説大學子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本康誥曰如保赤子心誠求之雖不中不逺矣詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母王制凡制五刑必即天論郵罰麗於事必即天論言與天意合論或為倫字倫理也郵過也麗附也過人罰人當各附於其事不可假他以喜怒凡聽五刑之訟必原父子之親立君臣之義以權之意論輕重之序慎測淺深之量以别之悉其聰明致其忠愛以盡之疑獄汜與衆共之衆疑赦之必察小大之比以成之小大猶輕重已行故事曰比例比必利反也刑者侀也侀者成也一成而不可變故君子盡心焉子路治蒲三年孔子過之入其境曰善哉由也恭敬以信矣入其邑曰善哉由也忠信而寛矣至庭曰善哉由也明察以斷矣子貢執轡而問曰夫子未見由之政而三稱其善可得聞乎孔子曰吾見其政也入其境田疇盡易草萊甚辟溝洫深治此其恭敬以信故其民盡力也入其邑牆屋完固樹木甚茂此其忠信以寛故其民不偷也至其庭庭甚清閒諸下用命此其明察以斷故政不擾也以此觀之雖三稱其善庸盡其美乎子産聽鄭國之政以其乗輿濟人於溱洧孟子曰惠而不知為政歲十一月徒杠成十二月輿梁成民未病涉也君子平其政行辟人可也焉得人人而濟之徒善不足以為政徒法不能以自行孟子曰仁言不如仁聲之入人深也善政不如善教之得民也善政得民財善教得民心視民如傷傳子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子大叔問政於子産子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣鬬子文三舍令尹無一日之積䘏民之故也成王聞子文之朝不及夕也於是乎每朝設脯一束糗一筐以羞子文至于今令尹秩之成王每出子文之禄必逃王止而後復人謂子文曰人生求富而子逃之何也對曰夫從政者以庇民也民多曠者而我取富焉是勤民以自封也死無日矣我逃死非逃富也季羔為衞士師刖人之足俄而衞蒯聵之亂季羔逃之郭門刖者守門焉謂季羔曰彼有隙季羔曰君子不踰又曰彼有竇季羔曰君子不隧又曰於此有室季羔乃入焉既而追者罷季羔將去謂刖者曰吾不能虧主之法而親則子之足今吾在難此正子之報怨之時而逃我者三何故哉曰斷足固我之罪無可奈何曩者君治臣以法令先人後臣欲臣之免也臣知之獄決當論見君愀然不樂見君顔色臣又知之君豈私臣哉天生君子其道固然此臣之所以脱君也漢曹參為齊相齊七十城天下初定悼惠王富於春秋參盡召長老諸生問所以安集百姓諸儒以百數言人人殊參未知所定聞膠西有葢公善治黄老言使人厚幣請之既見葢公為言治道貴清静而民自定推此類具言之參於是避正堂舎葢公焉齊國安集大稱賢相張歐為吏未嘗言按人專以誠長者處官官屬以為長者亦不敢大欺文景時循吏如河南守吳公蜀守文翁之屬皆謹身帥先居以亷平不至於嚴而民從化文翁仁愛好教化見蜀地僻陋有蠻夷風欲誘進之乃選郡縣小吏開敏有材者十餘人親自節厲遣詣京師受業博士數歲蜀生皆成就還歸文翁以為右職用次察舉官有至郡守刺史者又修起學宫於成都市中招下縣子弟以為學官弟子為除更繇髙者以補郡縣吏次為孝悌力田每出行縣益從學官諸生明經行者與俱使傳教令出入閨閤吏民見而榮之數年争欲為學官弟子繇是大化蜀地學於京師者比齊魯焉汲黯治官理民好清浄擇丞史任之責大指而已不苛小黄霸為頴川太守力行教化而後誅罰務在成就安全長吏許丞老病聾督郵白欲逐之霸曰許丞亷吏雖老尚能拜起送迎耳頗重聽何傷且善助之毋失賢者意或問其故霸曰數易長吏送故迎新之費及姦吏縁絶簿書盗財物公私費耗甚多皆當出於民所易新吏又未必賢或不如其故徒相益為亂凡治道去其泰甚者耳霸以外寛内明得吏民心户口歲增治為天下第一朱邑少為舒桐鄉嗇夫廉平不苛以愛利為行未嘗笞辱人存問耆老孤遺遇之有恩所至吏民愛敬宣帝即位渤海左右郡歲饑盗賊並起二千石不能擒制丞相御史舉龔遂可用上以為渤海太守召見謂遂曰渤海廢亂朕甚憂之君將何以息其盗賊以稱朕意遂對曰海瀕遐逺不霑聖化其民困於饑寒而吏不恤故使陛下赤子盗弄陛下之兵於潢池中耳今欲使臣勝之邪將安之也上曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事上許焉乘傳至渤海界郡聞新太守至發兵以迎遂皆遣還移書勑屬縣悉罷逐捕盗賊吏諸持鉏鈎田器者皆為良民吏毋得問持兵者廼為盗賊遂單車獨行至郡中翕然盗賊亦皆罷渤海又多刼掠相随聞遂教令即時解散棄其兵弩而持鉤鉏盗賊於是悉平民安土樂業遂廼開倉廪假貧民選用良吏尉安牧養焉見齊俗奢侈好末伎不由田作廼躬率以儉約勸民務農桑令口種一樹榆百本薤五十本葱一畦韭家二母彘五母雞民有帶持刀劍者令賣劒買牛賣刀買犢曰何為帶牛佩犢春夏不得不趨田畝秋冬課收歛益畜果實菱芡勞來循行郡中皆有畜積吏民皆富實獄訟衰息召信臣補陽穀長舉髙第遷上蔡長其治視民如子所居見稱述遷南陽太守其治如上蔡信臣為人勤力有方畧好為民興利務在富之躬勸耕農出入阡陌止舍離鄉亭稀有安居時行視郡中水泉開通溝瀆起水門堤閼凡數十處以廣溉灌歲歲増加多至三萬頃民得其利畜積有餘信臣為作均水約束刻石立於田畔以防分爭禁止嫁娶送終奢靡務出於儉約府縣吏家子弟好游敖不以田作為事輙斥罷之甚者案其不法以視好惡其化大行郡中莫不耕稼力田百姓歸之户口増倍盗賊獄訟衰止吏民親愛號之曰召父卓茂為宻令勞心諄諄視人如子舉善而教口無惡言吏人親愛而不忍欺之魯恭拜中牟令專以德化為理不任刑罰訟人許伯等争田累數令不能決恭為平理曲直皆退而自責輟耕相讓亭長從人借牛而不肯還之牛主訟於恭恭召亭長勑令歸牛者再三猶不從恭嘆曰是教化不行也欲解印綬去掾吏泣涕共留之亭長乃慙悔還牛詣獄受罪恭貰不問於是吏人信服劉寛典歴三郡温仁多恕雖在倉卒未嘗疾言遽色常以為齊之以刑民免而無恥吏民有過但用蒲鞭罰之示辱而已終不加苦事有功善推之自下災異或見引躬克責每行縣止息亭傳輙引學官祭酒及聚生徒相與講對每見父老慰以農里之言少年勉以孝悌之訓人感德興思日有所化任延為九真太守郡以射獵為業不知牛耕民嘗告糴交阯每致困乏延乃令鑄作田器教之墾闢田疇歲歲開廣百姓充給又駱越之民無嫁娶禮法各因淫好無適對匹不識父子之性夫婦之道延乃移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮聘令長吏以下各省俸禄以賑助之同時相娶者二千餘人是歲風雨順節穀稼豐衍其産子者多名子為任初平帝時錫光為交阯太守教導民夷漸以禮義化聲侔於延劉昆為江陵令時縣連年火災昆輙向火叩頭多能降雨止風遷𢎞農太守先是崤黽道多虎行旅不通昆為政三年仁化大行虎皆負子渡河帝聞而異之徴為光禄勲問曰前在江陵反風滅火後守𢎞農虎北渡河行何德政而致是事昆對曰偶然耳帝嘆曰此長者之言顧命書諸䇿孟嘗為合浦太守郡不産穀實而海出珠寳與交阯比境嘗通商販貨糴糧食先時宰守並多貪穢詭人採求不知紀極珠漸徙於交阯郡界於是行旅不至人物無資貧者死餓於道嘗至官革易前弊求民病利曽未踰歲去珠復還劉矩為雍丘令民有争訟矩常引之於前提耳訓告以為忿恚可忍縣官不可入使歸尋思訟者感之輙各罷去其有路得遺者皆推尋其主劉寵為㑹稽太守山民愿樸有白首不入市井者頗為官吏所擾寵簡除煩苛禁察非法郡中大化徴為將作大匠山隂縣有五六老叟龎眉皓髪自若耶山谷間出人齎百錢以送寵寵勞之曰父老何自苦對曰山谷鄙生未嘗識郡朝他時守吏發求民間至夜不絶或狗吠竟夕民不得安自明府下車以來狗不夜吠民不見吏今聞當見棄去故自扶奉送耳寵曰吾政何能及公言邪勤苦父老為人選一大錢受之仇覽為蒲亭長勸人生業為制科令農事既畢乃令子弟群居還就學覽初到亭人有陳元者獨與母居而母詣覽告元不孝覽驚曰吾近過元舍廬落整頓耕耘以時此非惡人當是教化未至耳母守寡務孤苦身投老奈何肆忿於一朝欲致子於不義乎母聞感悔涕泣而去覽乃親到元家與其母子飲因為陳人倫孝行譬以禍福之言元卒成孝子時考城令王渙政尚嚴猛聞覽以德化人署為主簿謂覽曰主簿聞陳元之過不罪而化之得無少鷹鸇之志耶覽曰以為鷹鸇不若鸞鳳故不為也王暢為南陽太守奮厲威猛功曹詠曰懇懇用刑不如行恩孳孳求姦未若禮賢舜舉臯陶不仁者逺随會為政晉盗奔秦虞芮入境讓心自生化人在德不在用刑暢納其諫更崇寛政慎刑簡罰教化遂行隋蘇瓊除清河太守有百姓乙普明兄弟争田積年援據至百人瓊召普明兄弟諭之曰天下難得者兄弟易求者田地假令得田地失兄弟心如何諸證莫不灑泣普明兄弟叩頭乞外更思遂還同居辛公義除岷州刺史土俗畏病一人有病合家避之父子夫婦不相看養孝義道絶公義患之分遣部内凡有疾病皆以牀轝安置㕔事暑月疫時或至數百公義親設榻獨坐其間所得俸禄盡用市藥迎醫療之於是悉差諸病家子孫慙謝後有病者争就使居其家無親屬因留養之始相慈愛此風遂革遷并州刺史下車先至獄露坐牢側親自驗問十餘日決斷咸盡方還受新訟不立文案遣當直佐寮一人側坐訊問事不盡公義即宿㕔不還閤或諫曰此事有程使君何自苦荅曰刺史無德可以導人尚令百姓繫於囹圄豈有禁人在獄而心安之乎罪人聞之咸自欵伏後有欲訟者鄉閭父老遽相曉曰此小事何忍勤勞使君訟者皆兩讓而止催徴一徽之歙縣催科素難嘉定中有為宰者措置夏税秋苗以一都為一簿與諸都保長相約毎日引三四都某都以甚日當限自近而逺謂如初一日引第一第二第三都初二日引第四第五第六都至十四日而諸都畢又自十六日再輪至二十九日而畢所以虚十五日者以其有小盡故也其簿居常置宅堂中閑暇輙一繙閲至某日某都當限則携是簿以出令保長當㕔抛箱知縣據案令鄉司當㕔批銷即與押字而保長者即出無覊留之苦無引展之費安得不如期以來又慮諸㕔期限之不同則保長又須伺候於是闗㑹諸㕔限日悉同保長以一日在縣了諸㕔之限即下鄉催科毎半月纔一到縣為力不煩得以從容辦事此一法也一隆興豐城人户多委掌攬輸賦而掌攬不以時納嘉定中有為宰者措置毎都出一青册毎板開税户二名第一行書毎人户第二行書幹事人三字第三行書掌攬人三字從本都保長傳至税户取闕如係本户自納即於第一行云自納或委幹事人納即於第二行書其姓名在何處居或委掌攬人納即於第三行書其姓名在何處居諸都人户税賦無不知其去着者於催科為尤便此又一法也一潭州諸縣皆有掌攬籍願為掌攬者入狀召保仍納抵産乃許充應無詭名之弊無私下掌攬而名不在官之弊無公吏罷役等人冒充之弊此又一法也一寧國宣城催科亦難辦嘉定中有宰到官首召諸都保長來飲之以酒而與之約曰自今官不以一毫擾汝汝亦毋得以違吾信命同僚皆哂其迂謂此間保司雖撻罰不能使之畏豈杯酒所能堅其約乎既而三年之間無一違信命者鞭朴束縳而不用此又以誠意感人之效也一鄉邦有老於吏事者嘗於保司限到率當㕔引展鄉司輩皆無所獲又恐生他弊則明出令毎引以錢若干文繫于引之腰抛之箱中保司所費不多而鄉吏亦沾微潤此雖𤨏末亦可為法一潭之醴陵慶元間有名士為宰者毎省限滿㸃追到官或十人或六七人宰謂之曰汝等罪當杖然不忍皆杖也則使探􅍐而受杖被刑者少而人皆知懼此又一法也以上數條皆可采用而歙縣造簿分限之法尤為切要葢簿書乃財賦之根柢財賦之出於簿書猶禾稼之出於田畝也故縣令於簿書當如舉子之治本經近世不然雖夏秋之簿未嘗不置然為宰者罕曽親閲則所用以催科者鄉司之草簿而已彼其平時飛走産錢出入賣弄無所不至若舉其草簿以催科則指未納為已納已納為未納皆惟其意所欲官賦之䧟失人户之被擾皆由於此若用歙縣之法則各都之納有欠無欠一目暸然故嘗謂催科之權在己而不在吏則不擾而辦在吏而不在己則擾而不辦葢謂此也今屬縣財賦之不辦大抵由其不能用歙縣之法故予於此尤惓惓焉右政經附録帥長沙咨目呈兩通判及職曹官某猥以庸虛謬當閫寄朝夕怵惕思所以仰答朝廷之恩俯慰士民之望惟頼官僚協心同力庶克有濟區區輙有所懐敢以布于左右葢聞為政之本風化是先潭之為俗素以淳古稱比者經其田里見其民樸且愿猶有近古氣象則知昔人所稱良不為過今欲因其本俗迪之於善已為文諭告俾興孝弟之行而厚宗族鄰里之恩不幸有過許之自新而毋狃於故習若夫推此意而逹之民則令佐之責也繼今邑民以事至官者願不憚其煩而諄曉之感之以至誠持之以悠久必有油然而興起者若民間有孝行純至友愛著聞與夫叶和親族賙濟鄉閭為衆所推者請采訪以實以上于州當與優加褒勸至於聽訟之際尤當以正名分厚風俗為主昔密學陳公襄為僊居宰教民以父義母慈兄友弟恭而人化服焉古今之民同一天性豈有可行於昔而不可行於今惟毋以薄待其民民亦將不忍以薄自待矣此某之所望於同僚者也然而正己之道未至愛人之意不孚則雖有教告而民未必從故其願與同僚各以四事自勉而為民去其十害何謂四事曰律己以亷凡名士大夫者萬分廉潔止是小善一㸃貪汚便為大惡不廉之吏如䝉不潔雖有他美莫能自贖故此以為四事之首撫民以仁為政者當體天地生萬物之心與父母保赤子之心有一毫之慘刻非仁也有一毫之忿疾非仁也存心以公傳曰公生明私意一萌則是非易位欲事之當理不可得也為事以勤是也當官者一日不勤下必有受其弊者古之聖賢猶且日昃不食坐以待旦况其餘乎今之世有勤於吏事者反以鄙俗目之而詩酒遊宴則謂之風流嫺雅此政之所以多疵民之所以受害也不可不戒何謂十害曰斷獄不公獄者民之大命豈可小有私曲聽訟不審訟有實有虚聽之不審則實者反虚虚者反實矣其可茍哉淹延囚繫一夫在囚舉室廢業囹圄之苦度日如歲可淹久乎慘酷用刑刑者不獲已而用人之體膚即己之體膚也何忍以慘酷加之乎今為吏者好以喜怒用刑甚者或以闗節用刑殊不思刑者國之典所以代天紏罪豈官吏逞忿行私者乎不可以不戒汎濫追呼一夫被追舉室惶擾有持引之需有出官之費貧者不免舉債甚者至於破家其可汎濫乎招引告訐告訐乃敗俗亂化之原有犯者自當痛治何可勾引今官司有受人實封狀與出牓召人告首隂私罪犯皆係非法不可為也重疊催税税出於田一歲一收可使一歲至再税乎有税而不輸此民户之罪也輸已而復責以輸是誰之罪乎今之州縣葢有已納而鈔不給或鈔雖給而籍不銷再追至官呈鈔乃免不勝其弊矣甚者有鈔不理必重納而後已破家蕩産鬻妻賣子徃徃由之有人心者豈忍為此科罰取財民間自二税合輸之外一毫不當妄取今縣道有科罰之政與夫非法科歛者皆民之深害也不可不革縱吏下鄉鄉村小民畏吏如虎縱吏下鄉猶虎出柙也弓手土兵尤當禁戢自非捕盗皆不可差出低價買物是也物同則價同豈有公私之異今州縣有所謂市令司者又有所謂行户者毎官司敷買視市令直率減十之二三或不即還甚至白著民户何以堪此某之區區其於四事敢不加勉同僚之賢固有不俟丁寧而素知自勉者矣然亦豈無當勉而未能者乎傳曰過而不改是謂過矣又曰誰謂德難厲其庶幾賢不肖之分在乎勉與不勉而已異時舉刺之行當以是為凖至若十害有無所未詳知萬一有之當如拯溺救焚不俟終日毋狃於因循之習毋牽於利害之私或事闗州郡當見告而商確焉必期於去民之瘼而後已此又某之所望於同僚者抑又有欲言者夫州之與縣本同一家長吏僚屬亦均一體若長吏偃然自尊不以情通于下僚屬退然自黙不以情逹于上則上下痞塞是非莫聞政疵民隠何從而理乎昔諸葛武侯開府作牧首以集衆思廣忠益為先某之視侯無能為役然虚心無我樂於聞善葢平日之素志自今一道之利病某之所當知者願以告焉某之所為有不合於理不便于俗者亦願以告焉告而適當敢不敬從如其未然不厭反復則湖湘九郡之民庶乎其䝉賜而某也庶乎其寡過矣敢以誠告尚其亮之幸甚某咨目上府判職曹以下諸同官㑹集十二縣知縣議事以詩送從來守令與斯民都是同胞一體親豈有脂膏供爾禄不思痛癢切吾身此邦祗似唐朝古我輩當如漢吏循今夕湘亭一巵酒重煩散作十分春諭俗牓文太守叨䝉上恩擢守湘土深惟朝廷委寄之重非特責以有司常務而已布宣德化導迪人心實守臣之事顧此邦風俗初未詳知今以天性人倫之大者與夫遷善改過之方為爾民告名之曰諭俗三事今具于後一古者教民必以孝弟為本其制刑亦以不孝不弟為先葢人之為人異乎禽獸者以其有父子之恩長幼之義也詩云父兮生我母兮鞠我繼之曰欲報之德昊天罔極此言父母之恩與天同大為人子者雖竭其力未足以報也今乃有親在而别籍異財親老而供養多闕親疾而救療弗力親殁而安厝弗時不思此身從何而有罔極之報當如是乎至於兄弟大倫古人謂之手足言其本同一體也今乃有以唇舌細故而致争錐刀小故而興訟長不恤幼卑或凌尊同氣之親何忍為此潭湘舊俗素稱淳厚如前數者未必有之太守此來欲以義理訓民未免預陳勸戒已行下州城十二縣自今民間有孝行純至友愛著聞采訪得實具申本州當與優加旌賞以為風俗之勸或其間有昧於禮法之人為不孝不弟之行鄉里父老其以太守之言曲加誨諭令其悛改昔後漢陳元為母所訟亭長仇香親到其家教以人倫大義遂為孝子北史清河之民有兄弟争財者郡守蘇瓊告以難得者兄弟易得者田宅遂感悟息訟同居如初况此邦之人本來易化以理開曉必無不從若上違太守之訓言下拒父老之忠告則是敗常亂俗之民王法所加將有不容己者一䧟刑戮終身不齒雖悔何及爾民其思之毋忽齒者列也言既以不孝不弟被刑是頑惡之人不得與良民並列也一古人於宗族之恩百世不絶葢服屬雖逺本同祖宗血脉相通豈容間隔至於鄰里鄉黨雖比宗族為踈然其有無相資緩急相倚患難相救疾病相扶持情義所闗亦為甚重今人於此二者往往視以為輕小有紛争輒相凌犯詞愬一起便為敵讐有一于斯皆非美事昔江州陳氏累世同居聚族至七百餘口前代嘗加旌表至今稱為義門吉州孫進士以惠施一鄉諸司列奏䝉恩特免文解士夫以為美談江湖之間境土相接豈有江西之人能為義舉而此獨不能今請逐處老成賢德之士交相勸率崇宗族之愛厚鄰里之歡時節徃來恩愛浹洽小小乖忤務相涵容不可輕啓訟端以致結成怨隙若能和叶親族賙濟里閭為衆論所推亦當特加褒異如其不體教訓妄起訟争懲一戒百所不容己爾民其勉之無忽一官之與民誼同一家休戚利害合相體恤為有司者不當以非法擾民為百姓者不當以非理擾官太守平時以愛人利物為心不啻饑渇視事云始切切講求已轉牒州縣官各以四事自勉而為民除其十害何謂四事律己以廉撫民以仁存心以公涖事以勤是也何謂十害斷獄不公聽訟不審淹延囚繫慘酷用刑汎濫追呼招引告訐重疊催税科罰取財縱吏下鄉低價買物是也十者有無所未詳知萬一有之當如拯溺救焚不俟終日務令田野安恬愁嘆不生或民間有公共利病太守所未及知許明白具狀前來陳述但不許匿名實封訐人私過言而有理即當詳酌以次施行爾民亦宜體太守此意更相勸戒非法之事莫妄作如豪强凶横吞謀貧弱奸狡詐偽欺騙善良教唆詞訟託囑公事聚衆鬬毆開坊賭博居停盗賊屠宰耕牛酟賣私酒興販雜物如此之類皆係非法無理之事莫妄興如事不干己輙行告訐裝撰詞説夾帶虚實如此之類皆是非理或日前所為未免害人若能幡然悔悟去惡從善如湯沃雪舊迹都消人誰無過改之為貴周處三害終為名賢父老其以此意為鄉閭弟子反覆解説必若教之不悛則家國有法官司有刑太守雖欲從寛有不可得爾民其幸聽之毋忽右諭俗三事開具在前太守之於爾民猶父兄之於子弟為父兄者只欲子弟之無過為太守者亦只欲爾民之無犯故於到任之初以誠心實意諄諄告諭其不識文義者鄉曲善士當以俗説為衆開陳使之通曉庶幾人人循理家家守法田里無追呼之擾公庭無鞭朴之聲民情熈然化為樂國豈不美哉故合牓示各宜知悉知泉州軍事當職昨守此州首末三年初無善状豈謂邦人亮其踈拙既去之後猶不相忘當職亦毎毎稱嘆士風之美民俗之厚未有如温陵比者十四五年之間雖泉山一草一木亦時入思念至聞永德二邑之冦難則為之悽愴聞歲事不登民生憔悴則為之慨嘆不圖閒散之久忽䝉上恩再付郡寄疾病衰羸本不欲出又念泉人相愛之深不忍固辭黽勉一行今已到任凡百政事悉遵前任日規模及以仁㢘公勤四事與僚屬更相勸勉期不負邦人屬望之意惟士若民亦宜各崇禮義各勵㢘恥各修孝弟忠信之行使士風之美民俗之厚有加於往時是又區區所望於泉人也當職此來精力雖非昔比然勤民之心不敢以衰病而或怠倉庫空虚前所未有然恤民之心不敢以匱乏而少改爾民亦宜體念此意詞訴之可已者不必重紊官司賦税之當輸者不必更待催督使當職聽斷之餘頗有暇日而官俸兵糧粗免欠闕庶得一意為爾民思長久之計不為細故末節所妨當職此來非有所貪慕惟欲興利除害使此邦復還樂土之舊而已比者入境之初延訪父老田里利病雖已畧聞本末曲折未能周悉凡士民有知其詳者遇見客受詞之日不惜條陳以告當加斟酌次第施行今後郡政或有未合事宜亦願指陳無隠庶幾利日以興害日以除年歲之間漸還舊規此當職垂老復來之本意也故兹曉諭各宜知悉勸諭文太守將至郡人歡迎自慚薄德莫副民望視事之始合有教條不憚諄諄為爾開説凡為人子孝敬是先其次友愛叶和兄弟人非父母豈有此身父母生兒多少艱苦妊娠將免九死一生乳哺三年飲母膏血攜持保抱日望長成如惜金珠如護性命慈烏反哺猶知報恩人而不孝鳥雀不若兄弟之愛同氣連枝古來取喻名為手足人無兄弟如無四肢痛痒相闗實同一體長當撫㓜弟當敬兄或值急難尤須救助其次族屬雖有親疎論其源流皆是骨肉譬如大木枝葉分披本同一根氣脉未逺豈宜相視便如路人其次鄉鄰情義亦重患難相扶疾病相救恩意徃來亦不可闕以上四事人道大端凡爾良民首當加勉家家孝友人人雍和省事息争安分循理得已且已莫妄興詞一到訟庭終身讐敵更相報復無有休期壊産破家多由於此語言喧競或不能無鄰里之間急宜勸止莫令交手致有鬭傷彼中汝拳汝受官棒本因小忿遂結深讐何似始初便從忍耐觸來莫競心下清凉市井經營雖圖利息亦須宜是莫太虧瞞枰㪷稱量各務公當大入小出天理不容濕米水肉尤為人害放債收息量取為宜分數太多貧者受苦舉債營運如約早還莫待到官然後償納飲酒無節少不生災賭博不戒多至為盗游手浮浪久必困窮勤謹服業終是得力太守今為此民復來有大不平當為伸雪有大不便當為蠲除事若細微不必相撓於爾無益於我徒勞違法犯刑最不可作如悖父母陵犯尊長健訟無理毆人重傷開坊聚賭停盗宰牛教唆詞訟欺騙財物等事皆是違法舊來有過各許自新教而不從刑斯無赦有過能改即是善良耆艾老成宜推此意誨爾子弟及其鄉人有違此言衆共誚責凡此忉怛欲曉編民讀書為儒師慕聖哲自知義理不待鄙言所望以身率先閭里一方一所有一仁賢以善教人人必感動去薄從厚弭災召和其始自今永為樂國諭州縣官僚某昨者叨帥長沙嘗以四事勸勉同僚曰律己以亷撫民以仁存心以公涖事以勤而某區區實身率之以是二年之間為潭人興利除害者粗有可紀今者䝉恩起廢再撫是邦竊伏惟念所以答上恩而慰民望者亦無出前之四事而已故願與司僚勉之葢泉之為州蠻貊聚焉犀珠寳貨見者興羡而豪民巨室有所訟愬志在求勝不吝揮金茍非好修自愛之士未有不為所汚染者不思㢘者士之美節汚者士之醜行士之不㢘猶女之不潔不潔之女雖巧容絶人不足自贖不亷之士縱有他美何足道哉昔人有懐四知之畏而却暮夜之金者葢隠微之際最為顯著聖賢之教謹獨是先故願同僚力修氷蘗之規各厲玉雪之操使士民起敬稱為㢘吏可珍可貴孰有踰此其所當勉者一也先儒有云一命之士茍存心於愛物於人必有所濟且以簿尉求之簿勤於勾稽使人無重疊追催之害尉勤於警捕使人無穿窬攻刼之擾則其所濟亦豈少哉等而上之其位愈髙繫民之休戚者愈大發一殘忍心斯民立遭荼毒之害發一掊克心斯民立被誅剥之殃盍亦反而思之針芒刺手茨棘傷足舉體凛然謂之痛楚刑威之慘百倍於此其可以喜怒施之乎虎豹在前坑穽在後號呼求救惟恐不免獄刑之苦何異於此其可使無辜者坐之乎已欲安居則不當擾民之居己欲豐財則不當朘民之財故曰己所不欲勿施于人其在聖門名之曰恕强勉而行可以致仁矧當斯民憔悴之時撫摩愛育尤不可緩故願同僚各以哀矜惻怛為心而以殘忍掊尅為戒則此邦之人其有瘳乎此所當勉者二也公事在官是非有理輕重有法不可以己私而拂天理亦不可骩公法以狥人情諸葛公有言吾心如平秤不能為人作輕重此有位之士所當視以為法也然人之情毎以私勝公者葢狗貨賄則不能公任喜怒則不能公黨親戚畏豪強顧禍福計利害則皆不能公殊不思是非之不可易者天理也輕重之不可踰者國法也以是為非以非為是則逆乎天理矣以輕為重以重為輕則違乎國法矣居官臨民而逆天理違國法於心安乎雷霆鬼神之誅金科玉條之禁其可忽乎故願同僚以公心持公道而不汨於私情不撓於私請庶幾枉直適宜而無寃抑不平之歎此所當勉者三也民生在勤勤則不匱則為民者不可以不勤業精于勤荒于嬉則為士者不可以不勤況為命吏所受者朝廷之爵位所享者下民之脂膏一或不勤則職業隳弛豈不上孤朝寄而下負民望乎今之居官者或以酣咏遨遊為尚以勤强敏恪為俗此前世衰弊之風也盛明之時豈宜有此陶威公有言大禹聖人猶惜寸隂至於衆人當惜分隂故賔佐有以蒱博廢事者則取而投之於江今願同僚共體此意職思其憂非休澣毋聚飲非節序毋出遊朝夕孜孜惟民事是力庶幾政平訟理田里得安其生此所當勉者四也某雖不敏請以身先毫髪少渝望加規警前此官僚之間或於四事未能無愧顧自今始洗心自新在昔聖賢許人改過故曰改而止儻猶玩視而不改焉誠恐物議沸騰在某亦不容茍止也涖事之初敢以誠告幸垂察焉勸諭事件於後當職入境以來延訪父老交印之後引受民詞田野利病縣政否臧頗聞其畧今檢舉前在任日約束及今來合行事件開具於後崇風教一嘉定十年到任以五事諭民其一謂人道所先莫如孝弟編民中有能孝於父母弟於兄長性行尤異者所屬詳加採訪以其實上於州優加賞勸或身居子職有闕侍養或父母在堂别蓄私財或犯分陵忽不顧長㓜之倫或因利忿争遽興骨肉之訟凡若此者有常刑後據廂官申到黄章取肝救母吳祥取肝救父各行之賞外又有承信郎周宗強割股以療親疾廼請州設宴用旗幟鼓樂送歸其家晉江縣申到劉璣有母百歲璣年七十孝養彌謹既加優禮又立夀母坊以表之進士吕洙女良子刲腹救父随即痊愈亦立懿孝坊自為之記又據百姓吳十同妻愬子吳良聰不孝審問得實杖脊於市髠髪居役其他勸懲大率類此今請各縣知佐勤行訪問如民間有孝友篤志之人保明申州待加褒表其有悖逆父母凌犯尊長為父兄所愬者宜以至恩大義諄諄勸曉茍能悔過姑許自新教之不從即加懲治甚者解州施行庶幾可儆愚俗一當職昨在任日遇親戚骨肉之訟多是靣加開諭徃徃幡然而改各從和㑹而去如卑㓜訴分産不平固當以法裁斷亦須先諭尊長自行從公均分或堅執不從然後當官監析其有分産已平而妄生詞説者却當以犯分誣罔坐之今請知佐毎聽訟當以正名分厚風俗為先庶幾可革偷薄一學校風化之首訪聞諸縣聞有不以教養為意者贍學之田或為豪民占據或為公吏侵漁甚至移作他用未嘗養士其間雖名養士又或容其居家日請錢米未嘗在學習讀或雖在學未嘗供課或雖供課而所習不過舉業未嘗誦習經史凡此皆有失國家育材待用之本意今請知佐究心措置學田所入嚴加鉤考毋令滲漏計其所入專以養士仍請主學官立定課程毎旬一再講書許士子問難再講之日各令覆説前所講者舉業之外更各課以經史使之紬繹義理講明世務庶幾異時皆為有用之才所補非淺一温陵人材之淵藪名德聞望相繼不絶近入郡境士友投書頗多其間葢有議論至深切事情益知此邦士風之盛誠非他處可及今恐諸縣管下有懐材抱藝而沉淪不偶守道安貧而不肯茍求者宜以禮延請致之學校使後有所師法仍以其姓名申郡併加之賔禮清獄犴一獄者生民大命茍非當坐刑名者自不應收繫為知縣者毎毎必須躬親庶免枉濫訪聞諸縣間有輕寘人於囹圄而付推鞫於吏手者徃徃寫成章子令其依様供寫及勒令立批出外索錢稍不聽從輙加捶楚哀號慘毒呼天莫聞或囚糧減削衣被單少饑凍至於交迫或枷具過重不與湯刷頸項為之潰爛或屋瓦踈漏不修有風雨之侵或牢牀打併不時有蟣蝨之苦或坑厠在近無所蔽障有臭穢之薫或囚病不早醫治致有瘐死或以輕罪與大辟同牢若此者不可勝數今請知縣以民命為念凡不當送獄公事勿輕收禁推問供責一一親臨飯食居處時時檢察嚴戢胥吏毋令擅自拷掠變亂情節至於大辟死生所闗豈容纎毫或至枉濫明有國憲幽有鬼神切宜究心勿或少忽一昨因臣僚申請勘獄先經縣丞葢慮知縣事繁不暇專意獄事亦州郡先付獄官之意也竊慮屬縣有悉付其事於丞不復加意者有縣丞憚於到獄徑取上囚徒就㕔鞫問者凡此皆有失申明本指今仰知縣以獄事為重專任其責雖與縣丞同勘即不許輙取罪囚出外以致莫伸情欵引惹教唆或丞老而病且乏廉聲亦不宜使之干預平賦税一前在任日曽約束輸納二税自有省限官司先期催納在法非輕至於預借税租法尤不許若公吏私借者准盗論今聞屬縣有未及省限而預先起催者有四年而預借五年之税五年而預借六七年之税者民間何以堪此仰自今為始須及省限方行起催仍只催當年及逓年未納税賦不許更行預借所有公吏私借之弊併委知縣嚴行覺察務令盡絶一前在任日一應官民寺觀輸納税米並令自量自槩止收槩下三升為耗諸縣亦一體施行今聞諸縣受納更不照前約束甚至取及二三㪷者自今仰並照州倉交納體例令納户自行量槩毋致少有過取其案吏倉㪷非理乞覔一切除罷受納官宜以身率下庶幾可革蠧弊一昨來節次約束逓年逃閣之數當與除豁不許勒令保長代輸其就州納者州鈔下縣縣吏不得藏匿立請主簿銷注其就縣納者即與印鈔給還仍對銷官簿不許重疊追催及以呈鈔為名輙行追擾今來訪聞諸縣於前數弊邑邑有之人户不勝其苦為保長者尤所不堪甚至保正副本非催科之人亦勒令代納違法害民莫此為甚仰諸縣截自日下並行革去一昨宋大卿在任剏令第五等户産錢一文納見錢七文足一應縻費已併在中今來訪聞諸縣公吏於七文之外又取縻費或反多於正錢殊失前政寛䘏之意今仰悉從革去正錢之外不得増添分文反為下户之困禁苛擾一前在任日曽坐條行下諸縣一應文引只付保司不許差人下鄉如諸色公吏輙帶家人下鄉騷擾者並從條收坐自後犯者懲治非一又鄉書等人毎遇鄉民收割輙至鄉村乞麥乞穀因人户有訴已將犯者編配及尉司弓手有因捕盗而多帶家丁擾害鄉村人户亦屢曽懲治是時田里間無一吏迹今聞數年以來此弊復作官司未有一事便差人下鄉縱横旁午為害最甚仰諸縣截自日下更不許仍循前弊兼本州既不專人下縣則縣邑亦豈應專人下鄉若公吏非承縣引而私徃鄉村乞覔委知佐嚴加覺察務令盡絶一昨曽行下在州官及諸縣知佐不許出引令公吏保司買物及因南安丞㕔出引付保司募役人買布因而妄行科配致人陳訴已將犯人斷買刺環及將縣丞取問今來訪聞諸縣仍有此弊仰知佐㕔日下一切杜絶不許責令公吏保司買物以致科擾人户一前在任日曽有約束聖節錫宴在近竊慮諸縣循習成例或於行鋪科買物件不依時價支錢或於民院科配錢物并假借器皿幕帟之屬因而乾没或妄追鄉村農民充樂社祗應或勒令良民婦女拘入妓籍如違許人陳訴後因惠安人户陳訴縣吏令粧束喬鼓祗應筵㑹已將犯人重斷勒罷又因永春人户陳訴縣吏因上元放燈科買燈油不還價錢亦將犯人重斷錮身監還并牒諸縣今後上元放燈不許白科鋪户油燭等物今來並照前來約束如有犯者並從重坐一昨因晉江縣為造軍期船敷買人户桐油赤藤等物不還價錢遂將承吏斷配仍約束自今不許並縁軍期輙有科配今來訪聞諸縣因本州抛下赤籐麻皮等物輙科保正副收買更不依時直還錢甚者分文不支致令保正賠錢買納入納之時公吏又有需乞為保正者其何以堪仰諸縣今後遇有軍期行下宜從長區處務令不擾而辦毋容縣吏並縁廣行科配及抑令保司賠備一昨因晉江重修縣衙出引監諸寺院納修造錢其承引人輙將三植院佃户打縳取乞已將犯人斷刺仍帖縣鎮自今非甚不獲已毋輙興土木之工其不急興修並仰住罷所有合修去處須管以見錢置塲依時價召人申賣不許出引敷率今恐屬縣或因修造輙有敷配仰日下除罷一昨曽約束民間争訟官司所當明辨是非如果冒犯刑名自合依條收坐今聞屬縣乃有專事科罸者遂使富民有罪得以幸免貧者被罰其苦甚於遭刑日下各仰除罷今恐屬縣有因公事而科罰民財者截自日下並令除罷一昨來約束人户分析當從其便訪聞諸縣乃有專置司局勒令開户者但知利其醋錢不顧有傷風教自今唯法應分析經官陳請者即與給印分書不許輙有抑勒今聞諸縣仍復有此甚者差吏下鄉勒令開析豈有此理仰截自日下並行住罷一昨嘗約束保正長以編民執役官司所宜存恤訪聞諸縣知佐科率多端公吏取乞尤甚致令破蕩財産自今除本役外不可妄有苛擾其初參得替繳引展限之需官員到任滿替供應陪備之費並與除免今聞諸縣循習前弊又復甚焉非當管幹之事勒令管幹不當令出錢者勒令出錢其害不可勝計由此畏避不肯充承寧賂吏輩求免是致都分有無保正去處仰知佐諸㕔自今於保正長等人務加寛䘏除煙火盗賊及自受文引外不許稍有苛擾如官司已存恤保正長而保正長却募破落過犯人代役在鄉騷擾即當究治施行一昨來約束寺院乃良民之保障所當寛養其力訪聞諸縣科率頗繁致令重困浸成不濟自今除依法供輸外自餘非泛需索並與除免今聞諸縣視前加甚若使管下寺院不濟者多則均敷之害必及人户仰自今照上項約束毋致違戾右開具在前照得廉仁公勤四者乃為政之綱領而崇風教清獄犴平賦税禁苛擾乃其條目當職於此不敢不勉亦願諸縣知佐以前四事及今四條掲之座右務在力行勿為文具其逐縣公吏有犯上項約束致招民詞當擇其尤者懲治一二外餘並許之自新人户亦不必論愬自今約束下日為始少有分毫違背斷不相容黥流斷刺必無輕恕帖諸縣知佐石井監鎮知委井榜本州及七縣市曹曉示帥福建曉諭文當司以安撫一道為職兵甲盗賊乃其專掌然必吏良而後民安民安而後盗息盗息而後兵偃四者相闗皆當致察乃紹定六年十一月恭奉詔書畧曰比年以來民窮盗起皆激於奸貪之吏大哉王言可謂明見萬里之外矣又自聖上親政之後登進忠賢退黜憸佞懲治賦吏禁止苞苴諸路監司太守皆以端謹廉潔者為之詔令之下無非為民當司奉行其敢不恪自到福州一意講求賦輸大重者首議蠲減科須病民者以次革除禁公人下鄉之擾除保司代納之害戒諭十二縣官屬毋濫刑毋横歛毋狥私毋黷貨毋通闗節毋任吏胥相與精白一心無負明詔丁寧之意今又以申飭十二縣者行下諸州各察其屬務去前六者之弊使斯民各安於田里爾民幸遇清平之時宜知愛身寡遇務本著業毋喜鬬毋健訟聖經有言一朝之忿忘其身以及其親非惑歟言人一時忿怒不能忍耐生事出來䘮身害命累及父母乃迷惑之人所為也又曰訟終凶言健訟者終必凶也又曰好勇鬬狠以危父母此三者爾民所當戒也聖經又言用天之道春勤於耕夏勤於耘秋勤於收歛之類是也因地之利髙田宜麥低田宜禾之類是也謹身節用以養父母謹身是不妄為節用是不妄費又曰身體髪膚受之父母不敢毁傷一毛髪一皮膚皆是父母遺體不敢毁傷何况犯刑憲自害身命此二者爾民所當勉也當職以本路之人為本路之帥其視八州皆如鄉黨其待百姓一如子弟官吏貪殘者當為爾懲之豪强侵暴者當為爾戢之盗賊剽竊為汝之害當為剪除之爾民既安其生宜思自保父母之身勿犯有司之法此牓到日所在耆老仁賢宜為開説使之通曉宜為勸勉使之興起自今以徃家家禮義人人忠孝變八閩之俗為鄒魯之鄉非惟當職所望於爾民是亦朝廷所望於帥臣也其聽敬之毋忽右令曉諭各宜知悉帥長沙勸民間置義倉文太守到任以來無一念不在斯民近因禱雨思所以為邦人久處之計在城則置平糶倉儲米數萬石歲歲出糶在諸縣則廣置社倉儲穀數萬碩歲歲出貸其為慮悉矣又念社倉貸穀止及末等有田之人而細民無田者不得預也復請于常平司以今歲義米附納社倉為賑糶之備然義米有限而貧民至多豈能均及於是又以居鄉之日所為義廪規約以勸有力之家葢欲公私叶力共濟斯民使無餓莩流離之苦夫人之貧富雖有不同推其由來均是天地之子先賢有言凡天下之疲癃殘疾惸獨鰥寡皆吾兄弟之顛連而無告者也我之與彼本同一氣我幸而富彼不幸而貧正當以我之有餘濟彼之不足自古及今能以惠䘏為念者其子孫必賢其門户必興葢困窮之民人雖忽之天地之心未嘗不憫之也我能惠䘏困窮則是合天地之心則必獲天地之祐此以理言者也若以利害計之無饑民則無盗賊無盗賊則鄉井安是又富家之利也况義廪云者非損所有以予之特出所有以糶之而已於富家無所損而於貧民實有益且毎歲勸分出於官司豈能無擾今舉行義廪使上中之户自相推排随力出備官司不計産彊敷之也自置糶塲自收糶錢官司不遣吏監臨之也價直髙下視時稍損官司不抑令痛減也况當歲艱民食悉仰勸分今州郡既立社倉又糶義米則與爾富民分任其責焉為不少矣其可不體官司美意相率而樂從哉今去秋成不逺已委知縣官各行勸諭期以十月終逐都結規約申聞于縣縣以申聞于州其能率先為倡者當以褒賞或謂潭人未易告諭諸縣勸糶自有成式何以義廪為哉為是説者以薄待吾民也十二邑之廣豈無好義樂善之君子且兩歲勸分亦有欣然出粟為數頗多如長沙之賈熊袁簡湘隂之鄧居中毛以大攸邑之武當世瀏陽之龍世永李天覺羅延圭安化之劉孝錫陳洪範李嶢張奉世湘鄉之馮楷醴陵之曹應龍周霖丁大謙湘潭之羅邦臣楊仁老向曉諭者州郡或借補官資或特立坊名或量與免役以旌異之矣又安知無聞風欣慕者乎必若諭之而不從則勸糶舊例葢有不得而廢者特不若人自為之則義風興行群情感悦其氣象不同爾譬之役法然為義役則有輯睦之風行差役則有争競之訟義廪猶義役也勸分猶差役也二者利害至為明白爾民其詳政經
